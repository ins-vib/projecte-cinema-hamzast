<form th:action="@{/room/editar}" th:object="${room}" method="post">
  <legend>Editar sala</legend>

  <!-- ID de la sala -->
  <input type="hidden" th:field="*{id}" />

  <!-- ID del cine -->
  <input type="hidden" th:field="*{cinema.id}" />

  <label for="titol">Títol:</label>
  <input type="text" th:field="*{name}" /><br /><br />

  <label for="durada">Capacity:</label>
  <input type="text" th:field="*{capacity}" /><br /><br />

  <button type="submit">Guardar</button>
</form>
