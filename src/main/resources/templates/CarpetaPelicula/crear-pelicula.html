<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear pel·lícula</title>
    <link rel="stylesheet" th:href="@{/css/crear-pelicula.css}">
    <style>
        .generes-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
            margin-top: 0.3rem;
        }
        .genere-check {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .genere-check input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <form th:action="@{/pelicula/create}" th:object="${pelicula}" method="post">
        <legend>Crear pel·lícula</legend>
        <div class="error" th:if="${error}" th:text="${error}"></div>

        <label>Títol:</label>
        <input type="text" th:field="*{Titol}" required />

        <label>Durada (min):</label>
        <input type="number" th:field="*{Durada}" min="1" required />

        <label>Sinopsi:</label>
        <input type="text" th:field="*{sinopsi}" required />

        <label>Estrena:</label>
        <input type="text" th:field="*{estrena}" placeholder="AAAA-MM-DD" required />

        <label>Gèneres:</label>
        <div class="generes-group">
            <label class="genere-check" th:each="genere : ${totsElsGeneres}">
                <input type="checkbox" name="genereIds" th:value="${genere.id}" />
                <span th:text="${genere.nom}">Gènere</span>
            </label>
        </div>

        <button type="submit">Guardar</button>
    </form>
    <script th:src="@{/js/form-validation.js}"></script>
</body>
</html>
