<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaDaw — Llista de Pel·lícules</title>
    <link rel="stylesheet" th:href="@{/css/landing.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header>
        <div class="logo">
            <span class="logo__dot"></span>
            CinemaDaw
            <span class="logo__badge">Admin</span>
        </div>
        <nav>
            <a href="/cinemes" class="nav__link">Cinemes</a>
            <a href="/pelicula" class="nav__link" style="color: var(--text);">Pel·lícules</a>
            <a href="/screenings/all" class="nav__link">Sessions</a>
            <a href="/admin/promos" class="nav__link">Codis Promo</a>
            <a href="/" class="nav__link">Tornar a la web</a>
        </nav>
    </header>

    <div class="admin-header-row">
        <h2>Catàleg de Pel·lícules</h2>
        <a th:href="@{/pelicula/create}" class="btn btn--primary">+ Nova Pel·lícula</a>
    </div>

    <div class="table-container">
        <table class="modern-table">
            <thead>
                <tr>
                    <th>Títol</th>
                    <th>Durada</th>
                    <th>Sinopsi</th>
                    <th>Estrena</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pelicula: ${llista}">
                    <td th:text="${pelicula.Titol}" style="color: var(--text); font-weight: 600;">pelicula</td>
                    <td th:text="${pelicula.Durada}">Durada</td>
                    <td th:text="${pelicula.sinopsi}" class="truncate">Sinopsi</td>
                    <td th:text="${pelicula.estrena}">Estrena</td>
                    <td class="table-actions">  
                        <a th:href="@{/pelicula/{id}(id=${pelicula.id})}">Veure</a>
                        <a th:href="@{/pelicula/edit/{id}(id=${pelicula.id})}">Editar</a>
                        <a th:href="@{/pelicula/delete/{id}(id=${pelicula.id})}" class="text-danger">Esborrar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer>
        <div class="footer__copy" style="text-align: center;">
            <p>© 2026 Cinema Daw Administració.</p>
        </div>
    </footer>
</body>
</html>
