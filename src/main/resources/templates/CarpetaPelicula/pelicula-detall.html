<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pelicula.Titol} + ' — CinemaDaw'">Detall Pel·lícula</title>
    <link rel="stylesheet" th:href="@{/css/pelicula-detall.css}">
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo__dot"></span>
            CinemaDaw
            <span class="logo__badge">Admin</span>
        </div>
        <nav>
            <a href="/cinemes"        class="nav__link">Cinemes</a>
            <a href="/pelicula"       class="nav__link nav__link--active">Pel·lícules</a>
            <a href="/screenings/all" class="nav__link">Sessions</a>
        </nav>
    </header>

    <main>

        <div class="back">
            <a href="/pelicula" class="back__link">← Tornar al catàleg</a>
        </div>

        <article class="detall">

            <div class="detall__header">
                <div class="detall__badge">✦ Pel·lícula</div>
                <h1 class="detall__title" th:text="${pelicula.Titol}">Títol</h1>
            </div>

            <div class="detall__meta">
                <div class="meta__item">
                    <span class="meta__label">Durada</span>
                    <span class="meta__value" th:text="${pelicula.Durada} + ' min'">— min</span>
                </div>
                <div class="meta__item">
                    <span class="meta__label">Estrena</span>
                    <span class="meta__value" th:text="${pelicula.estrena}">—</span>
                </div>
            </div>

            <div class="detall__sinopsi">
                <span class="meta__label">Sinopsi</span>
                <p th:text="${pelicula.sinopsi}">—</p>
            </div>

            <div class="detall__actions">
                <a th:href="@{/pelicula/edit/{id}(id=${pelicula.id})}"   class="btn btn--edit">Editar</a>
                <a th:href="@{/pelicula/delete/{id}(id=${pelicula.id})}" class="btn btn--danger">Esborrar</a>
            </div>

        </article>

    </main>

    <footer>
        <div class="footer__inner">
            <span class="footer__copy">© 2026 CinemaDaw</span>
            <a href="/logout" class="btn btn--outline">Tancar Sessió</a>
        </div>
    </footer>

</body>
</html>
