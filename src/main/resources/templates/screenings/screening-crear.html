<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Projecció</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <form th:action="@{/screening/new}" th:object="${screening}" method="post">
        <legend>Nova projecció</legend>

        <input type="hidden" th:field="*{room.id}" />

        <label>Pel·lícula:</label>
        <select th:field="*{movie.id}">
            <option th:each="p : ${pelicules}" th:value="${p.id}" th:text="${p.Titol}"></option>
        </select><br /><br />

        <label>Data:</label>
        <input type="date" th:field="*{screeningDate}" /><br /><br />

        <label>Hora:</label>
        <input type="time" th:field="*{screeningTime}" /><br /><br />

        <label>Preu (€):</label>
        <input type="number" step="0.01" th:field="*{price}" /><br /><br />

        <button type="submit">Guardar</button>
    </form>
</body>
</html>
