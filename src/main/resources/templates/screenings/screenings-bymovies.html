<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Sessions per Pel·lícula</title>
    <link rel="stylesheet" th:href="@{/css/screenings-all.css}">
</head>
<body>

<div class="page">

    <div class="page-header">
        <h1 class="page-title" th:text="${movie.Titol}">Pel·lícula</h1>
        <a class="back-link" href="/screenings/all">← Tornar</a>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Sala</th>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Preu</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(screenings)}">
                    <td colspan="5" class="empty">Cap sessió per aquesta pel·lícula.</td>
                </tr>
                <tr th:each="screening : ${screenings}">
                    <td th:text="${screening.room.name}"></td>
                    <td th:text="${screening.screeningDate}"></td>
                    <td th:text="${screening.screeningTime}"></td>
                    <td th:text="${screening.price}"></td>
                    <td>
                        <div class="actions">
                            <a class="action-link action-link--view"
                               th:href="@{/screening/{id}(id=${screening.id})}">Veure</a>
                            <a class="action-link action-link--edit"
                               th:href="@{/screening/edit/{id}(id=${screening.id})}">Editar</a>
                            <a class="action-link action-link--delete"
                               th:href="@{/screening/delete/{id}(id=${screening.id})}"
                               onclick="return confirm('Esborrar aquesta sessió?')">Esborrar</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
