<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${movie.Titol} + ' - Sesiones'">Sesiones</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .screenings-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #2563eb;
    }

    .screenings-header h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    .screenings-header__actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .sc-btn {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
    }

    .sc-btn--detail {
      background: #e5e7eb;
      color: #111827;
    }

    .sc-btn--edit {
      background: #2563eb;
      color: white;
    }

    .sc-btn--delete {
      background: #dc2626;
      color: white;
    }

    .movie-strip {
      padding: 24px;
      border-radius: 20px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #111827, #2563eb);
      color: white;
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.18);
    }

    .movie-strip__title {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    .movie-strip__meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      opacity: 0.92;
    }

    .movie-strip__synopsis {
      margin-top: 12px;
      max-width: 800px;
      line-height: 1.5;
    }

    .screenings-grid {
      display: grid;
      gap: 16px;
    }

    .screening-card {
      display: grid;
      grid-template-columns: 96px 1fr auto;
      gap: 18px;
      align-items: center;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    .screening-card__date {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 10px;
      border-radius: 16px;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .screening-card__day {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }

    .screening-card__month {
      margin-top: 4px;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .screening-card__movie {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: capitalize;
    }

    .screening-card__meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #4b5563;
    }

    .screening-card__actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .screenings-empty {
      padding: 28px;
      border-radius: 18px;
      background: white;
      text-align: center;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    @media (max-width: 860px) {
      .screenings-header,
      .screening-card {
        grid-template-columns: 1fr;
      }

      .screening-card__actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

  <main class="page">
    <div class="screenings-header">
      <div class="screenings-header__text">
        <span class="eyebrow">SESIONES</span>
        <h1 th:text="${movie.Titol}">Película</h1>
      </div>
      <div class="screenings-header__actions">
        <a class="sc-btn sc-btn--detail" th:href="@{/screenings/all}">Volver</a>
      </div>
    </div>

    <section class="movie-strip">
      <h2 class="movie-strip__title" th:text="${movie.Titol}">Película</h2>
      <div class="movie-strip__meta">
        <span th:text="${movie.Durada} + ' min'">120 min</span>
        <span>|</span>
        <span th:text="${movie.estrena}">2026-01-01</span>
      </div>
      <p class="movie-strip__synopsis" th:text="${movie.sinopsi}">
        Sinopsis de la película.
      </p>
    </section>

    <div class="screenings-grid" th:if="${not #lists.isEmpty(screenings)}">
      <article class="screening-card" th:each="screening : ${screenings}">
        <div class="screening-card__date">
          <span class="screening-card__day"
                th:text="${#temporals.format(screening.screeningDate, 'dd')}">01</span>
          <span class="screening-card__month"
                th:text="${#temporals.format(screening.screeningDate, 'MMM')}">ENE</span>
        </div>

        <div class="screening-card__info">
          <div class="screening-card__movie"
               th:text="${#temporals.format(screening.screeningDate, 'EEEE')}">Lunes</div>
          <div class="screening-card__meta">
            <span th:text="${screening.room.name}">Sala</span>
            <span>|</span>
            <span th:text="${#temporals.format(screening.screeningTime, 'HH:mm')}">20:00</span>
            <span>|</span>
            <span th:text="${screening.price} + ' €'">0 €</span>
          </div>
        </div>

        <div class="screening-card__actions">
          <a class="sc-btn sc-btn--detail"
             th:href="@{/screening/{id}(id=${screening.id})}">Ver detalles</a>
          <a class="sc-btn sc-btn--edit"
             th:href="@{/screening/edit/{id}(id=${screening.id})}">Editar</a>
          <a class="sc-btn sc-btn--delete"
             th:href="@{/screening/delete/{id}(id=${screening.id})}"
             onclick="return confirm('¿Eliminar esta sesión?')">Borrar</a>
        </div>
      </article>
    </div>

    <div class="screenings-empty" th:if="${#lists.isEmpty(screenings)}">
      <p>No hay sesiones programadas para esta película.</p>
      <a class="sc-btn sc-btn--detail" th:href="@{/screenings/all}">Volver al listado</a>
    </div>
  </main>

</body>
</html>
