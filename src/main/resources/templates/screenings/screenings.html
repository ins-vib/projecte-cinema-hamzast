<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sesiones — Lumière</title>
  <link rel="stylesheet" th:href="@{/css/layout.css}" />
  <link rel="stylesheet" th:href="@{/css/screenings.css}" />
  <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
</head>
<body>

  <div th:replace="~{layoutadmin :: layoutadmin(~{::content})}">
    <div th:fragment="content">

      <div class="screenings-header">
        <div class="screenings-header__text">
          <span class="eyebrow">// PROGRAMACIÓN</span>
          <h1>Sesiones</h1>
        </div>
        <a class="sc-btn sc-btn--edit" th:href="@{/admin/screening/create}">+ Nueva sesión</a>
      </div>

      <!-- Grid de películas con sesiones -->
      <div class="movies-grid" th:if="${not #lists.isEmpty(movies)}">
        <a class="movie-screening-card" th:each="movie : ${movies}"
          th:href="${pelicula.Titol}">

          <div class="movie-screening-card__poster"
            th:style="'background-image: url(/images/' + ${movie.posterUrl} + ')'">
            <div class="movie-screening-card__overlay"></div>
          </div>

          <div class="movie-screening-card__info">
            <span class="movie-screening-card__genre" th:text="${movie.gener}">Género</span>
            <h2 class="movie-screening-card__title" th:text="${movie.title}">Película</h2>
            <span class="movie-screening-card__cta">Ver sesiones →</span>
          </div>

        </a>
      </div>

      <!-- Empty state -->
      <div class="screenings-empty" th:if="${#lists.isEmpty(movies)}">
        <span class="screenings-empty__icon">🎬</span>
        <p>No hay sesiones programadas</p>
        <p class="screenings-empty__sub">Programa una sesión desde el detalle de una película o con el botón de arriba</p>
      </div>

    </div>
  </div>

</body>
</html>
