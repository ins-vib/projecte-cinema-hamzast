<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Silla</title>
    <link rel="stylesheet" th:href="@{/css/seat-create.css}">
</head>
<body>
    <form th:action="@{/seat/editar}" th:object="${seat}" method="post">
        <legend>Editar silla</legend>
        <div class="error" th:if="${error}" th:text="${error}"></div>

        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{room.id}" />

        <label>Fila:</label>
        <input type="text" th:field="*{seatRow}" required /><br /><br />

        <label>Número de silla:</label>
        <input type="number" th:field="*{seatNumber}" required /><br /><br />

        <label>Posició X:</label>
        <input type="number" th:field="*{posX}" required /><br /><br />

        <label>Posició Y:</label>
        <input type="number" th:field="*{posY}" required /><br /><br />

        <label>Tipus:</label>
        <select th:field="*{type}" required>
            <option th:each="t : ${seatTypes}" th:value="${t}" th:text="${t}"></option>
        </select><br /><br />

       <label>Estat:</label>
<select th:field="*{active}" required>
    <option value="true">Lliure</option>
    <option value="false">Ocupat</option>
</select><br /><br />

        <button type="submit">Guardar</button>
    </form>
    <script th:src="@{/js/form-validation.js}"></script>
</body>
</html>
