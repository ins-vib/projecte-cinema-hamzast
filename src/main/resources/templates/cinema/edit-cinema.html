<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" th:href="@{/css/cinema-create.css}" />
    <title>Document</title>
  </head>
  <body>
    <form th:action="@{/cinema/edit}" th:object="${cinema}" method="post">
      <legend>Nuevo cine</legend>
      <div class="error" th:if="${error}" th:text="${error}"></div>

      <input type="hidden" th:field="*{id}" />

      <label for="nombre">Name:</label>
      <input type="text" th:field="*{name}" required /><br /><br />
      <label for="nombre">Address:</label>
      <input type="text" th:field="*{adress}" required /><br /><br />
      <label for="nombre">City:</label>
      <input type="text" th:field="*{city}" required /><br /><br />
      <label for="nombre">Postal Code:</label>
      <input type="text" th:field="*{postalCode}" required /><br /><br />

      <button type="submit">Guardar</button>
    </form>
    <script th:src="@{/js/form-validation.js}"></script>
    
  </body>
</html>
