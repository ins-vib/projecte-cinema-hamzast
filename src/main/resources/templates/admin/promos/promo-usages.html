<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Usos del Código</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; color: #111; }
    h1 { margin-bottom: .5rem; }
    .meta { color: #6b7280; font-size: .9rem; margin-bottom: 1.5rem; }
    .btn { padding: .4rem 1rem; border-radius: 6px; border: none; cursor: pointer; font-size: .9rem; text-decoration: none; display: inline-block; background: #6b7280; color: #fff; margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { padding: .6rem .8rem; border: 1px solid #e5e7eb; text-align: left; }
    th { background: #f3f4f6; }
    .empty { color: #6b7280; }
  </style>
</head>
<body>
  <h1>Usos del código <strong th:text="${promo.code}">CODE</strong></h1>
  <p class="meta">
    Descuento: <strong th:text="${promo.discountPercent} + '%'">10%</strong> ·
    Usos: <strong th:text="${promo.timesUsed} + ' / ' + ${promo.maxUses}">0/100</strong>
  </p>

  <a th:href="@{/admin/promos}" class="btn">← Volver a la lista</a>

  <p class="empty" th:if="${#lists.isEmpty(usages)}">Este código aún no ha sido utilizado.</p>

  <table th:if="${not #lists.isEmpty(usages)}">
    <thead>
      <tr>
        <th>Usuario</th>
        <th>Pedido #</th>
        <th>Ahorro (€)</th>
        <th>Fecha de uso</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="u : ${usages}">
        <td th:text="${u.user.username}">usuario</td>
        <td th:text="${u.order.id}">1</td>
        <td th:text="${#numbers.formatDecimal(u.savedAmount, 1, 2)} + ' €'">0.00 €</td>
        <td th:text="${#temporals.format(u.usedAt, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
