<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title th:text="${editing == true} ? 'Editar Código' : 'Nuevo Código'">Código Promocional</title>
  <link rel="stylesheet" th:href="@{/css/promo-form.css}">
</head>
<body>

  <form th:action="${editing == true} ? @{/admin/promos/{id}/edit(id=${promo.id})} : @{/admin/promos/new}"
        method="post" th:object="${promo}">

    <h1 th:text="${editing == true} ? 'Editar Código Promocional' : 'Nuevo Código Promocional'">Código</h1>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <div class="field">
      <label for="code">Código</label>
      <input id="code" type="text" th:field="*{code}"
             th:class="${editing == true} ? 'readonly-code' : ''"
             th:readonly="${editing == true}"
             placeholder="Ej: VERANO20" maxlength="20" required />
      <span class="hint" th:if="${editing != true}">Solo letras y números, sin espacios. Se guardará en mayúsculas.</span>
      <span class="hint" th:if="${editing == true}">El código no se puede cambiar una vez creado.</span>
    </div>

    <div class="field">
      <label for="discountPercent">Descuento (%)</label>
      <input id="discountPercent" type="number" th:field="*{discountPercent}"
             min="1" max="100" required placeholder="Ej: 15" />
    </div>

    <div class="field">
      <label for="validFrom">Válido desde</label>
      <input id="validFrom" type="date" th:field="*{validFrom}" required />
    </div>

    <div class="field">
      <label for="validUntil">Válido hasta</label>
      <input id="validUntil" type="date" th:field="*{validUntil}" required />
    </div>

    <div class="field">
      <label for="maxUses">Número máximo de usos (total)</label>
      <input id="maxUses" type="number" th:field="*{maxUses}" min="1" required placeholder="Ej: 100" />
      <span class="hint">Cuántas veces en total puede usarse este código entre todos los usuarios.</span>
    </div>

    <div th:if="${editing == true}">
      <label class="checkbox-label">
        <input type="checkbox" th:field="*{active}" />
        Activo
      </label>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary"
              th:text="${editing == true} ? 'Guardar cambios' : 'Crear código'">Guardar</button>
      <a th:href="@{/admin/promos}" class="btn btn-secondary">Cancelar</a>
    </div>

  </form>
  <script th:src="@{/js/form-validation.js}"></script>

</body>
</html>
